<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AS-LiD</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f5f7fa;
      color: #333;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 10%;
      background: #111;
      color: white;
      position: sticky;
      top: 0;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 20px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: 400;
    }

    .hero {
      height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
    }

    .hero h1 {
      font-size: 3rem;
    }

    .hero p {
      margin-top: 10px;
      font-size: 1.2rem;
    }

    .container {
      width: 90%;
      max-width: 1200px;
      margin: 50px auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      color: white;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 2rem;
      }

      nav ul {
        flex-direction: column;
        background: #222;
        position: absolute;
        top: 70px;
        right: 0;
        width: 200px;
        display: none;
      }

      nav ul.active {
        display: flex;
      }

      .menu-toggle {
        display: block;
        cursor: pointer;
      }
    }

    .menu-toggle {
      display: none;
      font-size: 24px;
    }
  </style>
</head>
<body>

<header>
  <h2>AS-LiD</h2>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <nav>
    <ul id="menu">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>
</header>

<section class="hero">
  <div>
    <h1>Welcome to AS-LiD</h1>
    <p>Modern, Responsive, and Interactive Website</p>
  </div>
</section>

<section class="container">
  <div class="grid">
    <div class="card">Content 1</div>
    <div class="card">Content 2</div>
    <div class="card">Content 3</div>
  </div>
</section>

<footer>
  <p>© 2026 AS-LiD</p>
</footer>

<script>
  function toggleMenu() {
    document.getElementById('menu').classList.toggle('active');
  }
</script>

</body>
</html>
