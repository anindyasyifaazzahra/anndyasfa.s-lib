<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - AS-LiD</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;

    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    background:
    linear-gradient(rgba(30,42,56,0.75), rgba(62,76,89,0.75)),
    url('https://images.unsplash.com/photo-1521587760476-6c12a4b040da?q=80&w=1600');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    color:#333;
}

/* =========================
   FORM CONTAINER
========================= */

.main-content{
    flex:1;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:50px 20px;
}

.form-container{
    width:100%;
    max-width:750px;

    background:#f5f1e8;

    padding:40px;

    border-radius:25px;

    position:relative;

    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

/* =========================
   CLOSE BUTTON
========================= */

.close-btn{
    position:absolute;

    top:18px;
    right:22px;

    font-size:24px;

    color:#333;

    text-decoration:none;

    font-weight:bold;

    transition:0.3s ease;
}

.close-btn:hover{
    color:#1e2a38;
    transform:scale(1.15);
}

/* =========================
   TITLE
========================= */

h2{
    text-align:center;

    margin-bottom:30px;

    color:#1e2a38;

    font-size:30px;
}

/* =========================
   FORM
========================= */

form{
    display:flex;
    flex-wrap:wrap;
    gap:18px;
}

input{
    flex:1 1 45%;

    padding:14px 16px;

    border-radius:10px;

    border:1px solid #ccc;

    font-size:15px;

    font-family:'Poppins', sans-serif;

    outline:none;

    transition:0.3s ease;
}

input:focus{
    border-color:#2f3e46;
    box-shadow:0 0 8px rgba(47,62,70,0.2);
}

/* =========================
   BUTTON
========================= */

button{
    width:100%;

    padding:14px;

    margin-top:10px;

    border:none;

    border-radius:12px;

    background:#2f3e46;

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s ease;
}

button:hover{
    background:#1e2a38;
    transform:translateY(-2px);
}

/* =========================
   FOOTER
========================= */

footer{
    background:rgba(15,23,30,0.92);

    backdrop-filter:blur(10px);

    padding:20px;

    text-align:center;

    color:#bbb;

    font-size:14px;

    border-top:1px solid rgba(255,255,255,0.1);
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:768px){

    .form-container{
        padding:30px 20px;
    }

    input{
        flex:1 1 100%;
    }

    h2{
        font-size:25px;
    }
}

</style>
</head>

<body>

<div class="main-content">

    <div class="form-container">

        <a href="index.html" class="close-btn">✕</a>

        <h2>Form Pendaftaran</h2>

        <form id="registerForm">

            <input type="text" placeholder="First Name" required>

            <input type="text" placeholder="Last Name" required>

            <input type="email" placeholder="Email" required>

            <input type="tel" placeholder="Phone" required>

            <input type="password" placeholder="Create New Password" required>

            <input type="password" placeholder="Confirm New Password" required>

            <button type="submit">Daftar</button>

        </form>

    </div>

</div>

<footer>
    &copy; 2026 AS-LiD | Access Sphere – Literature Digital
</footer>

<script>

document.getElementById("registerForm").addEventListener("submit", function(e){

    e.preventDefault();

    let inputs = this.querySelectorAll("input");

    // Validasi password
    if(inputs[4].value !== inputs[5].value){

        alert("Password tidak cocok!");
        return;
    }

    let user = {

        firstName : inputs[0].value,
        lastName  : inputs[1].value,
        email     : inputs[2].value,
        phone     : inputs[3].value,
        password  : inputs[4].value
    };

    localStorage.setItem("user", JSON.stringify(user));

    alert("Pendaftaran berhasil! Silakan login.");

    window.location.href = "login.html";

});

</script>

</body>
</html>
