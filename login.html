<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - AS-LiD</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{

  background:
  linear-gradient(rgba(30,42,56,0.75), rgba(62,76,89,0.75)),
  url('https://images.unsplash.com/photo-1521587760476-6c12a4b040da?q=80&w=1600');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:20px;
}

/* FORM BOX */
.form-container{

  width:100%;
  max-width:430px;

  background:rgba(255,255,255,0.95);

  backdrop-filter:blur(10px);

  padding:45px 35px;

  border-radius:30px;

  position:relative;

  box-shadow:
  0 15px 35px rgba(0,0,0,0.35);

  animation:fadeIn 0.6s ease;
}

/* CLOSE BUTTON */
.close-btn{

  position:absolute;

  top:18px;
  right:22px;

  width:38px;
  height:38px;

  border-radius:50%;

  background:#f2f2f2;

  display:flex;
  justify-content:center;
  align-items:center;

  text-decoration:none;

  color:#1e2a38;

  font-size:18px;

  transition:0.3s;
}

.close-btn:hover{

  background:#2f3e46;

  color:#fff;

  transform:rotate(90deg);
}

/* TITLE */
.form-container h2{

  text-align:center;

  color:#1e2a38;

  font-size:34px;

  margin-bottom:10px;
}

.form-container p{

  text-align:center;

  color:#666;

  margin-bottom:35px;

  font-size:14px;
}

/* INPUT GROUP */
.input-group{

  position:relative;

  margin-bottom:22px;
}

.input-group i{

  position:absolute;

  left:18px;
  top:50%;

  transform:translateY(-50%);

  color:#777;
}

/* INPUT */
.input-group input{

  width:100%;

  padding:15px 15px 15px 50px;

  border:none;
  outline:none;

  border-radius:16px;

  background:#f3f4f6;

  font-size:15px;

  transition:0.3s;
}

.input-group input:focus{

  background:#fff;

  box-shadow:
  0 0 0 3px rgba(47,62,70,0.15);
}

/* BUTTON */
button{

  width:100%;

  padding:15px;

  border:none;

  border-radius:18px;

  background:#2f3e46;

  color:#fff;

  font-size:16px;
  font-weight:600;

  cursor:pointer;

  transition:0.3s;
}

button:hover{

  background:#c8b6a6;

  color:#1e2a38;

  transform:translateY(-3px);
}

/* LINK */
.register-link{

  margin-top:25px;

  text-align:center;

  font-size:14px;

  color:#555;
}

.register-link a{

  color:#2f3e46;

  text-decoration:none;

  font-weight:600;
}

.register-link a:hover{
  color:#c8b6a6;
}

/* ANIMATION */
@keyframes fadeIn{

  from{
    opacity:0;
    transform:translateY(30px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* MOBILE */
@media(max-width:768px){

  .form-container{

    padding:40px 25px;
  }

  .form-container h2{

    font-size:28px;
  }

}

</style>
</head>

<body>

<div class="form-container">

  <a href="index.html" class="close-btn">
    <i class="fa-solid fa-xmark"></i>
  </a>

  <h2>Welcome Back</h2>

  <p>
    Login untuk mengakses layanan AS-LiD
  </p>

  <form id="loginForm">

    <div class="input-group">

      <i class="fa-solid fa-envelope"></i>

      <input
        type="email"
        placeholder="Masukkan email"
        required
      >

    </div>

    <div class="input-group">

      <i class="fa-solid fa-lock"></i>

      <input
        type="password"
        placeholder="Masukkan password"
        required
      >

    </div>

    <button type="submit">
      Login
    </button>

  </form>

  <div class="register-link">

    Belum punya akun?
    <a href="register.html">
      Daftar Sekarang
    </a>

  </div>

</div>

<script>

document.getElementById("loginForm")
.addEventListener("submit", function(e){

  e.preventDefault();

  let email =
    document.getElementById("email").value;

  let password =
    document.getElementById("password").value;

  // ambil semua akun
  let users =
    JSON.parse(localStorage.getItem("users")) || [];

  // cari akun cocok
  let user = users.find(
    u => u.email === email &&
         u.password === password
  );

  if(user){

    // login berhasil
    localStorage.setItem(
      "isLoggedIn",
      "true"
    );

    localStorage.setItem(
      "currentUser",
      JSON.stringify(user)
    );

    alert("Login berhasil!");

    window.location.href = "index.html";

  }else{

    alert("Email atau password salah!");

  }

});

</script>

</body>
</html>
