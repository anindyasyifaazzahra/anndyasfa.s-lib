<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - AS-LiD</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* =========================
   RESET
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

/* =========================
   BODY
========================= */
body{
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    background:
    linear-gradient(rgba(30,42,56,0.75), rgba(62,76,89,0.75)),
    url('https://images.unsplash.com/photo-1521587760476-6c12a4b040da?q=80&w=1600');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* =========================
   LOGIN SECTION
========================= */
.login-wrapper{
    flex:1;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:40px 20px;
}

/* =========================
   FORM CONTAINER
========================= */
.form-container{
    width:100%;
    max-width:420px;

    background:#f5f1e8;

    padding:40px 35px;

    border-radius:25px;

    position:relative;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.25);

    animation:fadeIn 0.5s ease;
}

/* =========================
   CLOSE BUTTON
========================= */
.close-btn{
    position:absolute;
    top:15px;
    right:20px;

    font-size:22px;
    font-weight:bold;

    color:#333;
    text-decoration:none;

    transition:0.3s ease;
}

.close-btn:hover{
    color:#1e2a38;
    transform:scale(1.2);
}

/* =========================
   TITLE
========================= */
.form-container h2{
    text-align:center;
    margin-bottom:30px;

    color:#1e2a38;
    font-size:30px;
}

/* =========================
   INPUT
========================= */
.input-box{
    position:relative;
    margin-bottom:20px;
}

.input-box input{
    width:100%;

    padding:14px 15px;

    border:1px solid #ccc;
    border-radius:12px;

    font-size:15px;

    outline:none;

    transition:0.3s;
}

.input-box input:focus{
    border-color:#2f3e46;
    box-shadow:0 0 0 3px rgba(47,62,70,0.15);
}

/* =========================
   BUTTON
========================= */
button{
    width:100%;

    padding:14px;

    border:none;
    border-radius:12px;

    background:#2f3e46;
    color:white;

    font-size:16px;
    font-weight:600;

    cursor:pointer;

    transition:0.3s ease;
}

button:hover{
    background:#1e2a38;
    transform:translateY(-2px);
}

/* =========================
   FOOTER
========================= */
footer{
    background:rgba(15,23,30,0.92);

    backdrop-filter:blur(12px);

    padding:20px;

    border-top:1px solid rgba(255,255,255,0.1);
}

.footer-bottom{
    text-align:center;

    font-size:14px;
    color:#bbb;
}

/* =========================
   ANIMATION
========================= */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =========================
   RESPONSIVE
========================= */
@media(max-width:768px){

    .form-container{
        padding:35px 25px;
    }

    .form-container h2{
        font-size:26px;
    }

}

</style>
</head>

<body>

<!-- LOGIN -->
<section class="login-wrapper">

    <div class="form-container">

        <a href="index.html" class="close-btn">✕</a>

        <h2>Login</h2>

        <form id="loginForm">

            <div class="input-box">
                <input type="email" placeholder="Email" required>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password" required>
            </div>

            <button type="submit">
                <i class="fa-solid fa-right-to-bracket"></i>
                Login
            </button>

        </form>

    </div>

</section>

<!-- FOOTER -->
<footer>

    <div class="footer-bottom">
        &copy; 2026 AS-LiD | Access Sphere – Literature Digital
    </div>

</footer>

<!-- SCRIPT -->
<script>

document.getElementById("loginForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    let storedUser =
    JSON.parse(localStorage.getItem("user"));

    let email =
    this.querySelectorAll("input")[0].value;

    let password =
    this.querySelectorAll("input")[1].value;

    if(
        storedUser &&
        email === storedUser.email &&
        password === storedUser.password
    ){

        localStorage.setItem("isLoggedIn", "true");

        localStorage.setItem(
            "currentUser",
            storedUser.email
        );

        /* PINDAH KE HOME */
        window.location.href = "index.html";

    }else{

        alert("Email atau password salah!");

    }

});

</script>

</body>
</html>
